<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rootzy</title>
<style>
  :root {
    --ink: #23303a;
    --ink-soft: #51626d;
    --bg: #fbfaf7;
    --accent: #2f7a5f;
    --accent-soft: #e6f4ee;
    --border: #e6e1d6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
  }
  .emoji { font-size: 2.6rem; margin-bottom: 6px; }
  h1 {
    margin: 0 0 8px;
    font-size: 2rem;
    color: var(--accent);
  }
  p.tagline {
    margin: 0 0 30px;
    color: var(--ink-soft);
    font-size: 1rem;
  }
  a.link-btn {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 0.95rem;
    transition: opacity 0.15s ease;
  }
  a.link-btn:hover { opacity: 0.8; }

  @media (max-width: 480px) {
    .card { padding: 36px 22px; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="emoji">🌱</div>
      <h1>Rootzy</h1>
      <p class="tagline">Build habits that last.</p>
      <a class="link-btn" href="privacy/index.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
